hydra:
  searchpath:
    - file://${oc.env:PWD}/verl/trainer/config

defaults:
  - ppo_trainer
  - _self_

actor_rollout_ref:
  actor:
    dpo_beta: 0.1
    grad_norm_threshold: 1.0e9
    checkpoint:
      contents: ${.load_contents}
    optim:
      lr_warmup_steps: 15
      # This verl build still reads the deprecated field in fsdp_workers.
      warmup_style: constant
  rollout:
    # Use HF rollout for refplay by default. In this build, the FSDP<->vLLM
    # bridge hits sleep/wake and memory-sync issues before training starts.
    name: hf
    tensor_model_parallel_size: 1
    gpu_memory_utilization: 0.4
    n: 1
    val_kwargs:
      n: 1

data:
  seed: 42

reference_rollout:
  hybrid_engine: true
  model:
    path: ${actor_rollout_ref.model.path}
    tokenizer_path: ${actor_rollout_ref.model.tokenizer_path}
    trust_remote_code: ${actor_rollout_ref.model.trust_remote_code}
    use_remove_padding: ${actor_rollout_ref.model.use_remove_padding}
    enable_gradient_checkpointing: false
    use_liger: ${actor_rollout_ref.model.use_liger}
  actor: ${actor_rollout_ref.actor}
  ref: ${actor_rollout_ref.ref}
  rollout: ${actor_rollout_ref.rollout}

algorithm:
  adv_estimator: null
  dpo_beta: 0.1
  dpo_loss_type: sigmoid
  dpo_label_smoothing: 0.0
  use_kl_in_reward: false

trainer:
  project_name: verl_refplay
  experiment_name: gsm8k_refplay
  default_local_dir: checkpoints/${trainer.project_name}/${trainer.experiment_name}
  log_val_generations: 0
  ref_update_freq: -1
  resume_mode: disable

evaluation:
  checkpoint_path: null
  output_dir: null
  val_batch_size: 32
  preview_samples: 5
  do_sample: false
  n: 1
